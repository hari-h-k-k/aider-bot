name: Aider PR Review Fixer

description: Automatically fixes PR review comments using aider

inputs:
  morph_api_key:
    description: Morph API key for aider
    required: true
  github_token:
    description: GitHub token with PR read/write access
    required: false
    default: ${{ github.token }}
  model:
    description: LLM model for aider to use
    required: false
    default: morph/morph-minimax3-428b
  comment_body:
    description: The issue comment body that triggered the action
    required: true

runs:
  using: composite
  steps:
    - name: Get PR branch
      id: pr
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        branch=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
          https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }} \
          | python3 -c "import sys,json; print(json.load(sys.stdin)['head']['ref'])")
        echo "branch=$branch" >> $GITHUB_OUTPUT

    - name: Checkout PR branch
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.pr.outputs.branch }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-

    - name: Install dependencies
      shell: bash
      run: pip install -r ${{ github.action_path }}/requirements.txt

    - name: Run aider fix
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.issue.number }}
        PR_BRANCH: ${{ steps.pr.outputs.branch }}
        COMMENT_BODY: ${{ inputs.comment_body }}
        AIDER_MODEL: ${{ inputs.model }}
        OPENAI_API_KEY: ${{ inputs.morph_api_key }}
        OPENAI_API_BASE: https://api.morphllm.com/v1
      run: python ${{ github.action_path }}/main.py
